<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Michael Lee</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── LAYOUT CONTROLS — edit these values to adjust sizing ── */
    :root {
      --page-padding: 96px;   /* left/right margin (96px ≈ 1 inch) */
    }
    /* ─────────────────────────────────────────────────────────── */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #fff; color: #374151; line-height: 1.6; font-size: 15px; }
    a { color: inherit; text-decoration: none; }
    .container { max-width: 1800px; margin: 0 auto; padding: 0 var(--page-padding); }

    nav { padding: 20px 0; border-bottom: 1px solid #F3F4F6; display: flex; align-items: center; justify-content: space-between; }
    .nav-name { font-size: 0.9rem; font-weight: 600; color: #111827; }
    .nav-links { display: flex; align-items: center; gap: 20px; }
    .nav-link { font-size: 0.825rem; color: #6B7280; transition: color 0.15s; }
    .nav-link:hover { color: #111827; }
    .nav-link-accent { font-size: 0.825rem; font-weight: 500; color: #4F46E5; transition: color 0.15s; }
    .nav-link-accent:hover { color: #3730A3; }

    main { padding: 56px 0 48px; }
    section { margin-bottom: 48px; }

    .section-label { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #9CA3AF; margin-bottom: 18px; }

    .hero-name { font-size: 2.25rem; font-weight: 700; color: #111827; line-height: 1.15; margin-bottom: 8px; }
    .hero-tagline { font-size: 0.875rem; color: #9CA3AF; margin-bottom: 20px; }
    .hero-bio { font-size: 0.9375rem; color: #4B5563; line-height: 1.75; margin-bottom: 32px; }

    .cta-group { display: flex; gap: 12px; flex-wrap: wrap; }
    .btn-primary {
      display: inline-block; padding: 10px 22px; border-radius: 6px;
      background: #111827; color: #fff; font-size: 0.875rem; font-weight: 500;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: #1F2937; }
    .btn-secondary {
      display: inline-block; padding: 10px 22px; border-radius: 6px;
      background: #fff; color: #374151; font-size: 0.875rem; font-weight: 500;
      border: 1px solid #E5E7EB; transition: border-color 0.15s, color 0.15s;
    }
    .btn-secondary:hover { border-color: #9CA3AF; color: #111827; }

    .edu-row { display: flex; justify-content: space-between; align-items: baseline; padding: 10px 0; border-bottom: 1px solid #F9FAFB; gap: 12px; }
    .edu-row:last-child { border-bottom: none; }
    .edu-school { font-size: 0.875rem; font-weight: 500; color: #1F2937; }
    .edu-degree { font-size: 0.8rem; color: #6B7280; margin-left: 10px; }
    .edu-year { font-size: 0.8rem; color: #9CA3AF; flex-shrink: 0; }

    .skill-tag { display: inline-block; font-size: 0.75rem; padding: 4px 11px; border-radius: 9999px; background: #F9FAFB; color: #4B5563; border: 1px solid #E5E7EB; margin: 3px 3px 3px 0; }

    footer { padding: 24px 0; border-top: 1px solid #F3F4F6; font-size: 0.75rem; color: #9CA3AF; display: flex; justify-content: space-between; }
  </style>
</head>
<body>
<div class="container">

  <nav>
    <span class="nav-name">Michael Lee</span>
    <div class="nav-links" id="nav-links"></div>
  </nav>

  <main>
    <section>
      <div class="hero-name" id="hero-name"></div>
      <div class="hero-tagline" id="hero-tagline"></div>
      <p class="hero-bio" id="hero-bio"></p>
      <div class="cta-group">
        <a href="work.html" class="btn-primary">See All Work &rarr;</a>
        <a href="cv.pdf" download class="btn-secondary">Download CV</a>
      </div>
    </section>

    <section>
      <div class="section-label">Education</div>
      <div id="education-list"></div>
    </section>

    <section>
      <div class="section-label">Skills</div>
      <div id="skills-list"></div>
    </section>
  </main>

  <footer id="footer"></footer>
</div>

<script>
fetch('content.json')
  .then(r => r.json())
  .then(data => {
    const l = data.links || {};
    document.title = data.name;
    document.getElementById('nav-links').innerHTML = [
      l.email    ? `<a href="mailto:${l.email}" class="nav-link">Email</a>` : '',
      l.github   ? `<a href="${l.github}" target="_blank" class="nav-link">GitHub</a>` : '',
      l.linkedin ? `<a href="${l.linkedin}" target="_blank" class="nav-link">LinkedIn</a>` : '',
      `<a href="work.html" class="nav-link">Work</a>`,
      l.website  ? `<a href="${l.website}" target="_blank" class="nav-link-accent">${l.websiteLabel || l.website}</a>` : '',
    ].filter(Boolean).join('');

    document.getElementById('hero-name').textContent = data.name;
    document.getElementById('hero-tagline').textContent = data.tagline || '';
    document.getElementById('hero-bio').textContent = data.bio || '';

    document.getElementById('education-list').innerHTML = (data.education || []).map(e => `
      <div class="edu-row">
        <div>
          <span class="edu-school">${e.school}</span>
          <span class="edu-degree">${e.degree}</span>
        </div>
        <span class="edu-year">${e.year}</span>
      </div>
    `).join('');

    document.getElementById('skills-list').innerHTML = (data.skills || []).map(s =>
      `<span class="skill-tag">${s}</span>`
    ).join('');

    document.getElementById('footer').innerHTML = `
      <span>${data.location} &middot; ${data.availability}</span>
      <span>${data.name} &middot; ${data.year}</span>
    `;
  });
</script>
</body>
</html>
