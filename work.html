<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Work | Michael Lee</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #fff; color: #374151; line-height: 1.6; font-size: 15px; }
    a { color: inherit; text-decoration: none; }
    .container { max-width: 680px; margin: 0 auto; padding: 0 24px; }

    nav { padding: 20px 0; border-bottom: 1px solid #F3F4F6; display: flex; align-items: center; justify-content: space-between; }
    .nav-name { font-size: 0.9rem; font-weight: 600; color: #111827; transition: color 0.15s; }
    .nav-name:hover { color: #4F46E5; }
    .nav-links { display: flex; align-items: center; gap: 20px; }
    .nav-link { font-size: 0.825rem; color: #6B7280; transition: color 0.15s; }
    .nav-link:hover { color: #111827; }
    .nav-link-accent { font-size: 0.825rem; font-weight: 500; color: #4F46E5; transition: color 0.15s; }
    .nav-link-accent:hover { color: #3730A3; }

    main { padding: 48px 0; }

    .page-title { font-size: 1.5rem; font-weight: 700; color: #111827; margin-bottom: 28px; }

    .filter-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 36px; }
    .filter-btn {
      font-size: 0.75rem; font-weight: 500; padding: 5px 14px; border-radius: 9999px;
      border: 1px solid #E5E7EB; background: #F9FAFB; color: #6B7280;
      cursor: pointer; transition: all 0.15s;
    }
    .filter-btn:hover { border-color: #9CA3AF; color: #374151; }
    .filter-btn.active { background: #111827; color: #fff; border-color: #111827; }

    .project-entry { padding: 32px 0; border-bottom: 1px solid #F3F4F6; }
    .project-entry:first-child { border-top: 1px solid #F3F4F6; }
    .project-entry.hidden { display: none; }

    .entry-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 10px; }
    .entry-name { font-size: 1.0625rem; font-weight: 600; color: #111827; }
    .entry-desc { font-size: 0.9rem; color: #4B5563; line-height: 1.7; margin-bottom: 14px; }
    .entry-preview { width: 100%; border-radius: 8px; border: 1px solid #F3F4F6; display: block; max-height: 260px; object-fit: cover; margin-bottom: 14px; }
    .learn-more { font-size: 0.875rem; font-weight: 500; color: #4F46E5; transition: color 0.15s; }
    .learn-more:hover { color: #3730A3; }

    .tag { display: inline-block; font-size: 0.68rem; padding: 2px 8px; border-radius: 9999px; font-weight: 500; }
    .tag-live       { background: #ECFDF5; color: #065F46; border: 1px solid #A7F3D0; }
    .tag-active     { background: #EFF6FF; color: #1E40AF; border: 1px solid #BFDBFE; }
    .tag-production { background: #EEF2FF; color: #3730A3; border: 1px solid #C7D2FE; }
    .tag-cyber      { background: #F5F3FF; color: #5B21B6; border: 1px solid #DDD6FE; }
    .tag-academic   { background: #F8FAFC; color: #475569; border: 1px solid #E2E8F0; }

    footer { padding: 24px 0; border-top: 1px solid #F3F4F6; font-size: 0.75rem; color: #9CA3AF; display: flex; justify-content: space-between; }
  </style>
</head>
<body>
<div class="container">

  <nav>
    <a href="index.html" class="nav-name">Michael Lee</a>
    <div class="nav-links" id="nav-links"></div>
  </nav>

  <main>
    <h1 class="page-title">Work</h1>

    <div class="filter-row" id="filter-row"></div>

    <div id="project-list"></div>
  </main>

  <footer id="footer"></footer>
</div>

<script>
const tagClass = {
  live: 'tag-live', active: 'tag-active', production: 'tag-production',
  cyber: 'tag-cyber', academic: 'tag-academic',
};

function slugify(name) {
  return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
}

let activeFilters = new Set();

function applyFilters() {
  document.querySelectorAll('.project-entry').forEach(el => {
    const cats = JSON.parse(el.dataset.categories || '[]');
    const show = activeFilters.size === 0 || cats.some(c => activeFilters.has(c));
    el.classList.toggle('hidden', !show);
  });
}

fetch('content.json')
  .then(r => r.json())
  .then(data => {
    const l = data.links || {};
    document.getElementById('nav-links').innerHTML = [
      l.email    ? `<a href="mailto:${l.email}" class="nav-link">Email</a>` : '',
      l.github   ? `<a href="${l.github}" target="_blank" class="nav-link">GitHub</a>` : '',
      l.linkedin ? `<a href="${l.linkedin}" target="_blank" class="nav-link">LinkedIn</a>` : '',
      l.website  ? `<a href="${l.website}" target="_blank" class="nav-link-accent">${l.websiteLabel || l.website}</a>` : '',
    ].filter(Boolean).join('');

    // Build filters
    const allCats = [...new Set((data.projects || []).flatMap(p => p.categories || []))].sort();
    const filterRow = document.getElementById('filter-row');

    const allBtn = document.createElement('button');
    allBtn.textContent = 'All';
    allBtn.className = 'filter-btn active';
    allBtn.onclick = () => {
      activeFilters.clear();
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      allBtn.classList.add('active');
      applyFilters();
    };
    filterRow.appendChild(allBtn);

    allCats.forEach(cat => {
      const btn = document.createElement('button');
      btn.textContent = cat;
      btn.className = 'filter-btn';
      btn.onclick = () => {
        allBtn.classList.remove('active');
        if (activeFilters.has(cat)) {
          activeFilters.delete(cat);
          btn.classList.remove('active');
        } else {
          activeFilters.add(cat);
          btn.classList.add('active');
        }
        if (activeFilters.size === 0) allBtn.classList.add('active');
        applyFilters();
      };
      filterRow.appendChild(btn);
    });

    // Build project list
    const list = document.getElementById('project-list');
    (data.projects || []).forEach(p => {
      const slug = slugify(p.name);
      const tc = tagClass[p.statusType] || 'tag-academic';
      const brief = p.problem || '';

      const entry = document.createElement('div');
      entry.className = 'project-entry';
      entry.dataset.categories = JSON.stringify(p.categories || []);
      const previewHtml = p.preview
        ? `<img src="${p.preview}" class="entry-preview" alt="${p.name}" loading="lazy" />`
        : '';
      entry.innerHTML = `
        <div class="entry-header">
          <span class="entry-name">${p.name}</span>
          <span class="tag ${tc}">${p.status}</span>
        </div>
        <p class="entry-desc">${brief}</p>
        ${previewHtml}
        <a href="project.html?p=${slug}" class="learn-more">Learn More &rarr;</a>
      `;
      list.appendChild(entry);
    });

    document.getElementById('footer').innerHTML = `
      <span>${data.location} &middot; ${data.availability}</span>
      <span>${data.name} &middot; ${data.year}</span>
    `;
  });
</script>
</body>
</html>
