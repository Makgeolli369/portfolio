<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project | Michael Lee</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── LAYOUT CONTROLS — edit these values to adjust sizing ── */
    :root {
      --page-padding: 96px;   /* left/right margin (96px ≈ 1 inch) */
      --image-gap: 24px;      /* project page: gap between stacked images */
    }
    /* ─────────────────────────────────────────────────────────── */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #fff; color: #374151; line-height: 1.6; font-size: 15px; }
    a { color: inherit; text-decoration: none; }
    .container { max-width: 1800px; margin: 0 auto; padding: 0 var(--page-padding); }

    nav { padding: 20px 0; border-bottom: 1px solid #F3F4F6; display: flex; align-items: center; justify-content: space-between; }
    .nav-name { font-size: 0.9rem; font-weight: 600; color: #111827; transition: color 0.15s; }
    .nav-name:hover { color: #4F46E5; }
    .nav-links { display: flex; align-items: center; gap: 20px; }
    .nav-link { font-size: 0.825rem; color: #6B7280; transition: color 0.15s; }
    .nav-link:hover { color: #111827; }
    .nav-link-accent { font-size: 0.825rem; font-weight: 500; color: #4F46E5; transition: color 0.15s; }
    .nav-link-accent:hover { color: #3730A3; }

    main { padding: 48px 0; }

    .back-link { display: inline-flex; align-items: center; font-size: 0.825rem; color: #9CA3AF; margin-bottom: 36px; transition: color 0.15s; }
    .back-link:hover { color: #374151; }

    .project-name { font-size: 1.875rem; font-weight: 700; color: #111827; line-height: 1.2; margin-bottom: 12px; }
    .meta-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }

    .tag { display: inline-block; font-size: 0.68rem; padding: 2px 8px; border-radius: 9999px; font-weight: 500; }
    .tag-live       { background: #ECFDF5; color: #065F46; border: 1px solid #A7F3D0; }
    .tag-active     { background: #EFF6FF; color: #1E40AF; border: 1px solid #BFDBFE; }
    .tag-production { background: #EEF2FF; color: #3730A3; border: 1px solid #C7D2FE; }
    .tag-cyber      { background: #F5F3FF; color: #5B21B6; border: 1px solid #DDD6FE; }
    .tag-academic   { background: #F8FAFC; color: #475569; border: 1px solid #E2E8F0; }

    .stack-tag { display: inline-block; font-size: 0.7rem; padding: 2px 9px; border-radius: 9999px; background: #F3F4F6; color: #6B7280; font-weight: 500; margin: 2px 2px 2px 0; }

    .detail-para { font-size: 0.9375rem; color: #4B5563; line-height: 1.75; margin-bottom: 18px; }

    /* ── Image grid (under highlights, stacked single column) ── */
    .image-grid { display: grid; grid-template-columns: 1fr; gap: var(--image-gap); margin-top: 28px; }
    .image-grid img { width: 100%; border-radius: 8px; border: 1px solid #F3F4F6; display: block; }

    /* ── Highlights ── */
    .highlights-section { margin-top: 28px; padding-top: 28px; border-top: 1px solid #F3F4F6; }
    .section-label { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #9CA3AF; margin-bottom: 14px; }
    .highlight-item { display: flex; gap: 10px; font-size: 0.875rem; color: #4B5563; line-height: 1.6; margin-bottom: 10px; }
    .highlight-bullet { color: #D1D5DB; flex-shrink: 0; margin-top: 3px; font-size: 0.7rem; }

    .view-link { display: inline-block; margin-top: 28px; font-size: 0.875rem; font-weight: 500; color: #4F46E5; transition: color 0.15s; }
    .view-link:hover { color: #3730A3; }

    .not-found { padding: 60px 0; color: #9CA3AF; font-size: 0.9rem; }

    footer { padding: 24px 0; border-top: 1px solid #F3F4F6; font-size: 0.75rem; color: #9CA3AF; display: flex; justify-content: space-between; }
  </style>
</head>
<body>
<div class="container">

  <nav>
    <a href="index.html" class="nav-name">Michael Lee</a>
    <div class="nav-links" id="nav-links"></div>
  </nav>

  <main>
    <a href="work.html" class="back-link">&larr; Work</a>
    <div id="project-content"></div>
  </main>

  <footer id="footer"></footer>
</div>

<script>
const tagClass = {
  live: 'tag-live', active: 'tag-active', production: 'tag-production',
  cyber: 'tag-cyber', academic: 'tag-academic',
};

function slugify(name) {
  return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
}

fetch('content.json')
  .then(r => r.json())
  .then(data => {
    const l = data.links || {};
    document.getElementById('nav-links').innerHTML = [
      l.email    ? `<a href="mailto:${l.email}" class="nav-link">Email</a>` : '',
      l.github   ? `<a href="${l.github}" target="_blank" class="nav-link">GitHub</a>` : '',
      l.linkedin ? `<a href="${l.linkedin}" target="_blank" class="nav-link">LinkedIn</a>` : '',
      `<a href="work.html" class="nav-link">Work</a>`,
      l.website  ? `<a href="${l.website}" target="_blank" class="nav-link-accent">${l.websiteLabel || l.website}</a>` : '',
    ].filter(Boolean).join('');

    document.getElementById('footer').innerHTML = `
      <span>${data.location} &middot; ${data.availability}</span>
      <span>${data.name} &middot; ${data.year}</span>
    `;

    const slug = new URLSearchParams(window.location.search).get('p');
    const project = (data.projects || []).find(p => slugify(p.name) === slug);

    if (!project) {
      document.getElementById('project-content').innerHTML =
        `<div class="not-found">Project not found. <a href="work.html" style="color:#4F46E5;">Back to Work</a></div>`;
      return;
    }

    document.title = project.name + ' | ' + data.name;

    const tc = tagClass[project.statusType] || 'tag-academic';

    const stackHtml = (project.stack || []).map(t =>
      `<span class="stack-tag">${t}</span>`
    ).join('');

    const paragraphs = [project.problem, project.evidence, project.result]
      .filter(Boolean)
      .map(t => `<p class="detail-para">${t}</p>`)
      .join('');

    // Images (rendered after highlights)
    const imgs = project.images || [];
    let imageHtml = '';
    if (imgs.length > 0) {
      imageHtml = `<div class="image-grid">
        ${imgs.map(src => `<img src="${src}" alt="${project.name}" loading="lazy" />`).join('')}
      </div>`;
    }

    // Highlights
    const highlightsHtml = (project.highlights || []).length
      ? `<div class="highlights-section">
          <div class="section-label">Highlights</div>
          ${project.highlights.map(h => `
            <div class="highlight-item">
              <span class="highlight-bullet">&#9656;</span>
              <span>${h}</span>
            </div>`).join('')}
        </div>`
      : '';

    const linkHtml = project.url
      ? `<a href="${project.url}" target="_blank" class="view-link">View Project &#8599;</a>`
      : '';

    document.getElementById('project-content').innerHTML = `
      <h1 class="project-name">${project.name}</h1>
      <div class="meta-row">
        <span class="tag ${tc}">${project.status}</span>
      </div>
      <div style="margin-bottom:24px;">${stackHtml}</div>
      ${paragraphs}
      ${highlightsHtml}
      ${imageHtml}
      ${linkHtml}
    `;
  });
</script>
</body>
</html>
